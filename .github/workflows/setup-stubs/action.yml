name: >
  Set up Mechanical stubs

description: |
  Downloads the Mechanical stubs __init__.py files to the repository and creates
  the __init__.py file for all versions of Mechanical stubs.

inputs:

  # Required inputs
  folder-pattern:
    description: >
      Pattern of the folder to download. For example, "v[0-9][0-9][0-9]-3.12"
    required: true
    type: string

  package-path:
    description: >
      Path to where the package is located. For example, src/ansys/mechanical/stubs
    required: true
    type: string

  python-version:
    description: >
      Python version in the folder pattern. For example, 3.10
    required: true
    type: string

  # Optional inputs
  mechanical-revn:
    description: >
      Mechanical revn. For example, v241
    required: false
    default: ""
    type: string

runs:
  using: "composite"
  steps:

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Get cwd
      shell: python
      run: |
        import os

        print(os.getcwd())

    - name: Download the library artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        pattern: ${{ inputs.folder-pattern }}
        path: ${{ inputs.package-path }}

    - name: Rename folders
      shell: python
      run: |
        import os
        import shutil

        base_path = "${{ inputs.package-path }}"
        py_suffix = "-${{ inputs.python-version }}"

        for entry in os.listdir(base_path):
            if py_suffix in entry:
                original = os.path.join(base_path, entry)
                if not os.path.isdir(original):
                    continue
                renamed = os.path.join(base_path, entry.replace(py_suffix, ""))
                if os.path.exists(renamed):
                    shutil.copytree(original, renamed, dirs_exist_ok=True)
                    shutil.rmtree(original)
                else:
                    os.rename(original, renamed)

        mechanical_versions = ["241", "242", "251", "252", "261"]
        for version in mechanical_versions:
            version_dir = os.path.join(base_path, f"v{version}")
            init_file = os.path.join(version_dir, "__init__.py")
            if not os.path.exists(init_file):
                os.makedirs(version_dir, exist_ok=True)
                with open(init_file, "w") as f:
                    f.write(f'"""Ansys Mechanical v{version} module."""\n')

    - name: Ensure the Mechanical version folder is not empty
      if: ${{ inputs.mechanical-revn != '' }}
      shell: bash
      run: |
        revn_folder="${{ inputs.package-path }}/${{ inputs.mechanical-revn }}"
        if [ "$(find "$revn_folder" -mindepth 1 -print -quit)" ]; then
          echo "$revn_folder is not empty."
        else
          echo "$revn_folder is empty."
          echo "Please check the stubs were downloaded to the correct location."
          return 2
        fi

    - name: Create __init__.py in ${{ inputs.package-path }}
      shell: python
      run: |
        import os

        subfolders = [ f.name for f in os.scandir("${{ inputs.package-path }}/") if f.is_dir() ]

        with open("${{ inputs.package-path }}/__init__.py", "w") as f:
            f.write('''try:
            import importlib.metadata as importlib_metadata
        except ModuleNotFoundError:  # pragma: no cover
            import importlib_metadata  # type: ignore

        __version__ = importlib_metadata.version("ansys-mechanical-stubs")
        """Patch version for the ansys-mechanical-stubs package."""\n\n''')

            for folder in subfolders:
                if "v" in folder:
                    f.write(f"from .{folder} import *\n")
                    f.write('"""Mechanical installation version."""\n')
