name: >
  Set up Mechanical stubs

description: |
  Downloads the Mechanical stubs __init__.py files to the repository and creates
  the __init__.py file for all versions of Mechanical stubs.

inputs:

  # Required inputs
  folder-pattern:
    description: >
      Pattern of the folder to download. For example, "v[0-9][0-9][0-9]-3.12"
    required: true
    type: string

  package-path:
    description: >
      Path to where the package is located. For example, src/ansys/mechanical/stubs
    required: true
    type: string

  python-version:
    description: >
      Python version in the folder pattern. For example, 3.10
    required: true
    type: string

  # Optional inputs
  mechanical-revn:
    description: >
      Mechanical revn. For example, v242
    required: false
    default: ""
    type: string

runs:
  using: "composite"
  steps:

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Get cwd
      shell: python
      run: |
        import os

        print(os.getcwd())

        print(f"Creating directory: ${{ inputs.package-path }}/_downloaded_artifacts")
        os.makedirs(f"{os.getcwd()}/${{ inputs.package-path }}/_downloaded_artifacts", exist_ok=True)

    - name: Download the library artifacts
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
      with:
        pattern: ${{ inputs.folder-pattern }}
        merge-multiple: false
        path: ${{ inputs.package-path }}/_downloaded_artifacts

    - name: Rename folders
      shell: python
      run: |
        import os
        import shutil

        base_path = "${{ inputs.package-path }}"
        download_root = os.path.join(base_path, "_downloaded_artifacts")
        py_suffix = "-${{ inputs.python-version }}"
        mechanical_revn = "${{ inputs.mechanical-revn }}"

        if not os.path.isdir(download_root):
            raise RuntimeError(f"Expected download directory does not exist: {download_root}")

        def merge_directory(src: str, dst: str) -> None:
            os.makedirs(dst, exist_ok=True)
            for child in os.listdir(src):
                child_src = os.path.join(src, child)
                child_dst = os.path.join(dst, child)
                if os.path.isdir(child_src):
                    shutil.copytree(child_src, child_dst, dirs_exist_ok=True)
                else:
                    shutil.copy2(child_src, child_dst)

        entries = [e for e in os.listdir(download_root) if os.path.isdir(os.path.join(download_root, e))]
        version_artifact_dirs = [e for e in entries if py_suffix in e and e.startswith("v")]

        for artifact_dir in version_artifact_dirs:
            source = os.path.join(download_root, artifact_dir)
            version_name = artifact_dir.replace(py_suffix, "")
            destination = os.path.join(base_path, version_name)
            merge_directory(source, destination)

        if not version_artifact_dirs:
            # Some download-artifact layouts place files directly in the target path
            # when a single artifact is matched. In that case, require mechanical_revn
            # so content can be moved to a deterministic version folder.
            if not mechanical_revn:
                raise RuntimeError(
                    "No versioned artifact directories were found and 'mechanical-revn' was not provided. "
                    "Cannot infer destination version folder safely."
                )

            destination = os.path.join(base_path, mechanical_revn)
            merge_directory(download_root, destination)

        shutil.rmtree(download_root)

        mechanical_versions = ["242", "251", "252", "261"]
        for version in mechanical_versions:
            version_dir = os.path.join(base_path, f"v{version}")
            init_file = os.path.join(version_dir, "__init__.py")
            if not os.path.exists(init_file):
                os.makedirs(version_dir, exist_ok=True)
                with open(init_file, "w") as f:
                    f.write(f'"""Ansys Mechanical v{version} module."""\n')

    - name: Ensure the Mechanical version folder is not empty
      if: ${{ inputs.mechanical-revn != '' }}
      shell: bash
      run: |
        revn_folder="${{ inputs.package-path }}/${{ inputs.mechanical-revn }}"
        if [ "$(find "$revn_folder" -mindepth 1 -print -quit)" ]; then
          echo "$revn_folder is not empty."
        else
          echo "$revn_folder is empty."
          echo "Please check the stubs were downloaded to the correct location."
          return 2
        fi

    - name: Create __init__.py in ${{ inputs.package-path }}
      shell: python
      run: |
        import os

        subfolders = [ f.name for f in os.scandir("${{ inputs.package-path }}/") if f.is_dir() ]

        with open("${{ inputs.package-path }}/__init__.py", "w") as f:
            f.write('''try:
            import importlib.metadata as importlib_metadata
        except ModuleNotFoundError:  # pragma: no cover
            import importlib_metadata  # type: ignore

        __version__ = importlib_metadata.version("ansys-mechanical-stubs")
        """Patch version for the ansys-mechanical-stubs package."""\n\n''')

            for folder in subfolders:
                if "v" in folder:
                    f.write(f"from .{folder} import *\n")
                    f.write('"""Mechanical installation version."""\n')
