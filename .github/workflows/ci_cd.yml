name: GitHub CI
on:
  pull_request:
    types: [opened, reopened, synchronize, edited, closed]
  schedule:
    - cron: '0 0 * * *' # every night at midnight UTC
  workflow_dispatch:
    inputs:
      mechanical-version:
        description: "Create stubs for the following Mechanical version:"
        type: choice
        options:
          - '261'
          - '252'
          - '251'
          - '242'
        default: '261'
      python-version:
        description: "Create stubs using the following python version:"
        type: choice
        options:
          - '3.11'
          - '3.12'
          - '3.13'
          - 'All of the above'
        default: 'All of the above'
  push:
    tags:
      - "*"
    branches:
      - main

env:
  MAIN_PYTHON_VERSION: '3.12'
  DEBIAN_FRONTEND: 'noninteractive'
  DEFAULT_MECHANICAL_VERSION: '252'
  PACKAGE_NAME: ansys-mechanical-stubs
  PACKAGE_NAMESPACE: ansys.mechanical.stubs
  PACKAGE_PATH: src/ansys/mechanical/stubs
  DOCUMENTATION_CNAME: scripting.mechanical.docs.pyansys.com
  LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
  ANSYSLMD_LICENSE_FILE: 1055@${{ secrets.LICENSE_SERVER }}
  ANSYS_WORKBENCH_LOGGING_CONSOLE: 0
  ANSYS_WORKBENCH_LOGGING: 0
  ANSYS_WORKBENCH_LOGGING_FILTER_LEVEL: 2
  NUM_CORES: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-changelog:
    name: "Update CHANGELOG for new tag"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: ansys/actions/doc-deploy-changelog@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  style:
    name: Code style
    runs-on: ubuntu-latest
    steps:
      - name: "PyAnsys code style checks"
        uses: ansys/actions/code-style@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  doc-style:
    name: Documentation style check
    runs-on: ubuntu-latest
    steps:
      - name: "PyAnsys documentation style checks"
        uses: ansys/actions/doc-style@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          vale-config: doc/.vale.ini
          token: ${{ secrets.GITHUB_TOKEN }}

  set-mechanical-versions:
    name: Set Mechanical image and version variables
    runs-on: ubuntu-latest
    outputs:
      # '25.2.0'
      image: ${{ steps.save-versions.outputs.image }}
      # '252'
      version: ${{ steps.save-versions.outputs.version }}
      # ['3.10', '3.11', '3.12', '3.13']
      python-version: ${{ steps.save-versions.outputs.python_version }}
      # ['3.11', '3.12', '3.13']
      stubs-python-version: ${{ steps.save-versions.outputs.stubs_python_version }}
    steps:
      - id: save-versions
        run: |
          if [[ -z "${{ inputs.mechanical-version }}" ]]; then
            export mech_version=""
            export mech_image_version=""
          else
            export mech_version=${{ inputs.mechanical-version }}
            # Create the image version from the Mechanical version (252 -> 25.2.0)
            export mech_image_version=${mech_version:0:2}.${mech_version:2}.0
          fi

          # Set the variables
          echo "image=$mech_image_version" >> $GITHUB_OUTPUT
          echo "version=$mech_version" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            python_version="['3.10', '3.11', '3.12', '3.13']"
            stubs_python_version="['3.11', '3.12', '3.13']"
          else
            if [[ -z "${{ inputs.python-version }}" ]]; then
              python_version="['${{ env.MAIN_PYTHON_VERSION }}']"
              stubs_python_version="['${{ env.MAIN_PYTHON_VERSION }}']"
            else
              if [[ "${{ inputs.python-version }}" == "All of the above" ]]; then
                python_version="['3.10', '3.11', '3.12', '3.13']"
                stubs_python_version="['3.11', '3.12', '3.13']"
              else
                python_version="['${{ inputs.python-version }}']"
                stubs_python_version="['${{ inputs.python-version }}']"
              fi
            fi
          fi

          echo "python_version=$python_version" >> $GITHUB_OUTPUT
          echo "stubs_python_version=$stubs_python_version" >> $GITHUB_OUTPUT

  config-matrix:
    runs-on: ubuntu-latest
    needs: [set-mechanical-versions]
    outputs:
      stubs-matrix: ${{ steps.set-matrix.outputs.stubs_matrix }}
      test-matrix: ${{ steps.set-matrix.outputs.test_matrix }}
      doc-build-matrix: ${{ steps.set-matrix.outputs.doc_build_matrix }}
    steps:
      - id: set-matrix
        run: |
          # Run all stable mechanical versions release tags
          # For pull requests and merges use latest stable versions (242-261)
          # Documentation is only generated for 242-261
          if ${{ github.event_name == 'workflow_dispatch' }}; then
            echo "stubs_matrix<<DELIMITER" >> ${GITHUB_OUTPUT}
            echo "{\"mechanical\":[{\"image\":\"${{ needs.set-mechanical-versions.outputs.image }}\",\"version\":\"${{ needs.set-mechanical-versions.outputs.version }}\"}],\"python-version\":${{ needs.set-mechanical-versions.outputs.stubs-python-version }}}" >> ${GITHUB_OUTPUT}
            echo "DELIMITER" >> ${GITHUB_OUTPUT}
            echo "doc_build_matrix={\"mechanical-revn\":[${{ needs.set-mechanical-versions.outputs.version }}],\"python-version\":[${{ env.MAIN_PYTHON_VERSION }}]}" >> $GITHUB_OUTPUT
          else
            echo "stubs_matrix<<DELIMITER" >> ${GITHUB_OUTPUT}
            echo "{\"mechanical\":[{\"image\":\"24.2.0\",\"version\":\"242\"},{\"image\":\"25.1.0\",\"version\":\"251\"},{\"image\":\"25.2.0\",\"version\":\"252\"},{\"image\":\"26.1.0\",\"version\":\"261\"}],\"python-version\":${{ needs.set-mechanical-versions.outputs.stubs-python-version }}}" >> ${GITHUB_OUTPUT}
            echo "DELIMITER" >> ${GITHUB_OUTPUT}

            echo "doc_build_matrix={\"mechanical-revn\":['242', '251', '252', '261'],\"python-version\":[${{ env.MAIN_PYTHON_VERSION }}]}" >> $GITHUB_OUTPUT
          fi

          echo "test_matrix={\"os\":['ubuntu-latest', 'windows-latest'],\"python-version\":${{ needs.set-mechanical-versions.outputs.python-version }}}" >> $GITHUB_OUTPUT


  get-image-digests:
    name: Get Mechanical image digests
    runs-on: ubuntu-latest
    needs: [config-matrix]
    permissions:
      packages: read
    outputs:
      digests: ${{ steps.get-digests.outputs.digests }}
    steps:
      - name: "Log in to GHCR"
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: "Get image digests"
        id: get-digests
        run: |
          STUBS_MATRIX='${{ needs.config-matrix.outputs.stubs-matrix }}'
          IMAGES=$(echo "$STUBS_MATRIX" | python3 -c "import sys,json; m=json.load(sys.stdin); print(' '.join(i['image'] for i in m['mechanical']))")

          json="{"
          first=true
          for img in $IMAGES; do
            digest=$(docker manifest inspect "ghcr.io/ansys/mechanical:${img}" 2>/dev/null \
              | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin),sort_keys=True))" \
              | sha256sum | cut -c1-16 || echo "${img}")
            echo "  ghcr.io/ansys/mechanical:${img} -> ${digest}"
            if $first; then first=false; else json="${json},"; fi
            json="${json}\"${img}\":\"${digest}\""
          done
          json="${json}}"
          echo "digests=${json}" >> $GITHUB_OUTPUT

  gen-stubs:
    name: Generate Mechanical stubs
    needs: [style, doc-style, config-matrix, get-image-digests]
    runs-on: public-ubuntu-latest-16-cores
    container:
      image: ghcr.io/ansys/mechanical:${{ matrix.mechanical.image }}
      options: --entrypoint /bin/bash
    strategy:
      matrix: ${{ fromJSON(needs.config-matrix.outputs.stubs-matrix) }}
    steps:
      - name: "Install Git and clone project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Extract image digest for cache key"
        id: image-digest
        run: |
          DIGESTS='${{ needs.get-image-digests.outputs.digests }}'
          IMAGE="${{ matrix.mechanical.image }}"
          DIGEST=$(echo "$DIGESTS" | grep -o "\"${IMAGE}\":\"[^\"]*\"" | cut -d'"' -f4)
          echo "digest=${DIGEST:-${{ matrix.mechanical.image }}}" >> $GITHUB_OUTPUT

      - name: "Restore stubs cache"
        id: cache-stubs
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ env.PACKAGE_PATH }}/v${{ matrix.mechanical.version }}
          key: stubs-v${{ matrix.mechanical.version }}-py${{ matrix.python-version }}-${{ steps.image-digest.outputs.digest }}-${{ hashFiles('src/ansys/mechanical/stubs/stub_generator/**') }}

      - name: "Set up Python"
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        uses: ./.github/workflows/setup-python/
        with:
          python-version: ${{ matrix.python-version }}

      - name: "Configure Python"
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        run: |
          # Verify Python installation
          python --version
          if ! python -m pip --version >/dev/null 2>&1; then
            python -m ensurepip --default-pip
          fi
          python -m pip install --upgrade pip
          python -m pip --version

      - name: "Cache pip packages"
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ matrix.python-version }}-

      - name: "Install dependencies"
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        env:
          AWP_ROOTDV_DEV: /install/ansys_inc/v${{ matrix.mechanical.version }}
          ANSYSCL${{ matrix.mechanical.version }}_DIR: /install/ansys_inc/v${{ matrix.mechanical.version }}/licensingclient
        run: |
          apt update
          apt install -y lsb-release mono-complete make git zip

          python -m pip install -e .[build,doc]
          python -m pip install --trusted-host pypi.org --trusted-host pypi.python.org --trusted-host files.pythonhosted.org pip setuptools
          python -m pip install --upgrade pip flit pytz tzdata ansys-pythonnet

      - name: "Generate the Mechanical stub files"
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        env:
          AWP_ROOTDV_DEV: /install/ansys_inc/v${{ matrix.mechanical.version }}
          ANSYSCL${{ matrix.mechanical.version }}_DIR: /install/ansys_inc/v${{ matrix.mechanical.version }}/licensingclient
        run: |
          python src/ansys/mechanical/stubs/stub_generator/create_files.py > results.txt
        continue-on-error: True

      - name: "Check stubs were generated"
        if: steps.cache-stubs.outputs.cache-hit != 'true'
        run: |
          cat results.txt

          # Check if failure occurred
          output=$(grep -c "Done processing all mechanical stubs" results.txt)
          if [ $output -eq 1 ]; then
            echo "All mechanical stubs were created"
            exit 0
          else
            echo "There was an issue creating the mechanical stubs"
            exit 1
          fi

      - name: "Upload v${{ matrix.mechanical.version }} stubs"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: v${{ matrix.mechanical.version }}-${{ matrix.python-version }}
          path: ${{ env.PACKAGE_PATH }}/v${{ matrix.mechanical.version }}
          retention-days: 7

  smoke-tests:
    name: Build wheelhouse
    runs-on: ${{ matrix.os }}
    needs: [gen-stubs, config-matrix]
    strategy:
      matrix: ${{ fromJSON(needs.config-matrix.outputs.test-matrix) }}
    steps:
    - name: "Install Git and clone project"
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: "Download stubs"
      uses: ./.github/workflows/setup-stubs/
      with:
        folder-pattern: "v[0-9][0-9][0-9]-${{ env.MAIN_PYTHON_VERSION }}"
        package-path: "${{ env.PACKAGE_PATH }}"
        python-version: ${{ env.MAIN_PYTHON_VERSION }}

    - name: "Build a wheelhouse of the Python library"
      uses: ansys/actions/build-wheelhouse@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
      with:
        library-name: ${{ env.PACKAGE_NAME }}
        operating-system: ${{ matrix.os }}
        python-version: ${{ matrix.python-version }}
        checkout: false

  doc-build:
    name: Make html documentation
    if: github.event.action != 'closed'
    needs: [set-mechanical-versions, gen-stubs, smoke-tests, config-matrix]
    runs-on: public-ubuntu-latest-16-cores
    strategy:
      matrix: ${{ fromJSON(needs.config-matrix.outputs.doc-build-matrix) }}
    steps:
    - name: "Install Git and clone project"
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: "Download stubs"
      uses: ./.github/workflows/setup-stubs/
      with:
        folder-pattern: "v${{ matrix.mechanical-revn }}-${{ matrix.python-version }}"
        package-path: "${{ env.PACKAGE_PATH }}"
        python-version: ${{ matrix.python-version }}
        mechanical-revn: "v${{ matrix.mechanical-revn }}"

    - name: "Compute stubs hash for doc cache key"
      id: doc-cache-key
      run: |
        stubs_hash=$(find ${{ env.PACKAGE_PATH }}/v${{ matrix.mechanical-revn }} -type f -name "*.py" | sort | xargs sha256sum | sha256sum | cut -c1-16)
        echo "stubs-hash=${stubs_hash}" >> $GITHUB_OUTPUT

    - name: "Cache pip packages"
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ~/.cache/pip
        key: pip-doc-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          pip-doc-${{ matrix.python-version }}-

    - name: "Install project & doc dependencies"
      run: |
        python -m pip install -e .[doc]

    - name: "Restore documentation build cache"
      id: cache-docs
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: doc/_build
        key: doc-build-v${{ matrix.mechanical-revn }}-py${{ matrix.python-version }}-${{ steps.doc-cache-key.outputs.stubs-hash }}-${{ hashFiles('doc/source/**', 'pyproject.toml') }}

    - name: "Generate HTML documentation"
      if: steps.cache-docs.outputs.cache-hit != 'true'
      env:
        MECHANICAL_REVN: ${{ matrix.mechanical-revn }}
      run: |
        make -C doc html

    - name: "Change version switcher"
      if: steps.cache-docs.outputs.cache-hit != 'true'
      shell: python
      env:
        MECHANICAL_REVN: ${{ matrix.mechanical-revn }}
      run: |
        import os
        import re

        def replace_version_match(html_folder, mechanical_revn):
            """Replace wildcard version match with the actual mechanical revision
            in all JS and HTML files under the given HTML folder."""
            pattern = re.compile(
                r"DOCUMENTATION_OPTIONS\.theme_switcher_version_match\s*=\s*'\*';"
            )
            replacement = (
                "DOCUMENTATION_OPTIONS.theme_switcher_version_match = '" + mechanical_revn + "';"
            )
            for root, dirs, files in os.walk(html_folder):
                for filename in files:
                    if filename.endswith(".js") or filename.endswith(".html"):
                        filepath = os.path.join(root, filename)
                        with open(filepath, "r", encoding="utf-8", errors="ignore") as f:
                            content = f.read()
                        updated = pattern.sub(replacement, content)
                        if updated != content:
                            with open(filepath, "w", encoding="utf-8") as f:
                                f.write(updated)
                            print("Updated: " + filepath)

        replace_version_match("doc/_build/html", os.getenv("MECHANICAL_REVN"))

    - name: "Upload version Sphinx HTML documentation"
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: matrix.python-version == env.MAIN_PYTHON_VERSION
      with:
        name: documentation-html-v${{ matrix.mechanical-revn }}
        path: doc/_build/html
        retention-days: 7

  combine-docs:
    name: Combine documentation
    runs-on: public-ubuntu-latest-16-cores
    needs: [doc-build, config-matrix]
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.config-matrix.outputs.doc-build-matrix).python-version }}
    steps:
      - name: "Install Git and clone project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Download all HTML documentation"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: documentation-html-v*

      - name: "Compute artifact hash for cache key"
        id: artifact-hash
        run: |
          hash=$(find documentation-html-v* -type f 2>/dev/null | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "hash=${hash}" >> $GITHUB_OUTPUT

      - name: "Restore combined docs cache"
        id: cache-combined
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: documentation-html
          key: combined-docs-${{ steps.artifact-hash.outputs.hash }}

      - name: "Combine HTML documentation"
        if: steps.cache-combined.outputs.cache-hit != 'true'
        run: |
          combine_documentation() {
            combined_folder_name=$1
            combined_folder_path=$(pwd)/$combined_folder_name
            version_folders=($(find . -maxdepth 1 -type d -name "$combined_folder_name-v[0-9][0-9][0-9]"))

            for folder in "${version_folders[@]}"; do
              if [ -d "$combined_folder_path" ]; then
                  folder_version="${folder##*-}"
                  version_path="api/ansys/mechanical/stubs/${folder_version}"
                  mkdir -p "$combined_folder_path/$version_path"
                  cp -r $folder/$version_path/* $combined_folder_path/$version_path
              else
                  mkdir -p "$combined_folder_path"
                  echo "$combined_folder_path folder created."
                  cp -r "$folder/"* "$combined_folder_path"
              fi
            done
          }

          combine_documentation "documentation-html"

          # Regenerate index.html redirect after combining, pointing to the
          # highest (latest) v*** version present in the combined output.
          latest=$(find documentation-html/api/ansys/mechanical/stubs -maxdepth 1 -type d -name "v[0-9][0-9][0-9]" | sort | tail -1 | xargs basename)
          if [ -n "$latest" ]; then
            printf '<!DOCTYPE html>\n<html>\n  <head>\n    <meta charset="utf-8" />\n    <meta http-equiv="refresh" content="0; url=api/ansys/mechanical/stubs/%s/index.html" />\n    <title>PyMechanical Stubs</title>\n    <script>window.location.replace("api/ansys/mechanical/stubs/%s/index.html");</script>\n  </head>\n  <body>\n    <p>Redirecting to the latest API version. If not redirected, <a href="api/ansys/mechanical/stubs/%s/index.html">click here</a>.</p>\n  </body>\n</html>\n' "$latest" "$latest" "$latest" > documentation-html/index.html
            echo "index.html updated to redirect to ${latest}"
          fi

      - name: "Upload HTML documentation"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: |
          github.event_name == 'workflow_dispatch' ||
          matrix.python-version == env.MAIN_PYTHON_VERSION
        with:
          name: combined-documentation-html
          path: documentation-html
          retention-days: 7

      - name: "Create fake PDF"
        if: |
          github.event_name == 'workflow_dispatch' ||
          matrix.python-version == env.MAIN_PYTHON_VERSION
        run: |
          mkdir -p doc/_build/latex
          touch doc/_build/latex/doc.pdf

      - name: Upload PDF Documentation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: |
          github.event_name == 'workflow_dispatch' ||
          matrix.python-version == env.MAIN_PYTHON_VERSION
        with:
          name: documentation-pdf
          path: doc/_build/latex/doc.pdf
          retention-days: 7

  clean-docs:
    name: Clean HTML documentation
    runs-on: public-ubuntu-latest-16-cores
    needs: [combine-docs, config-matrix]
    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.config-matrix.outputs.doc-build-matrix).python-version }}
    steps:
      - name: "Install Git and clone project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Cache pip packages"
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/pip
          key: pip-clean-docs-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-clean-docs-${{ matrix.python-version }}-

      - name: "Install project & doc dependencies"
        run: |
          python -m pip install -e .[doc]
          mkdir combined-documentation-html

      - name: "Download all HTML documentation"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: combined-documentation-html
          path: combined-documentation-html

      - name: "Compute artifact hash for cache key"
        id: artifact-hash
        run: |
          hash=$(find combined-documentation-html -type f 2>/dev/null | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "hash=${hash}" >> $GITHUB_OUTPUT

      - name: "Restore cleaned docs cache"
        id: cache-cleaned
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            combined-documentation-html
            output
          key: clean-docs-${{ steps.artifact-hash.outputs.hash }}-${{ hashFiles('scripts/**') }}

      - name: "Replace Windows apostrophes with single quotes"
        if: steps.cache-cleaned.outputs.cache-hit != 'true'
        run: |
          python scripts/replace-windows-apostrophes.py --html_api_folder combined-documentation-html/api

      - name: "HTML: Make all hrefs local"
        if: steps.cache-cleaned.outputs.cache-hit != 'true'
        run: |
          python scripts/fix-href-html.py --api_folder combined-documentation-html/api

      - name: "Upload HTML documentation"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: |
          github.event_name == 'workflow_dispatch' ||
          matrix.python-version == env.MAIN_PYTHON_VERSION
        with:
          name: documentation-html
          path: combined-documentation-html
          retention-days: 7

  doc-deploy-pr:
    name: "Deploy PR documentation"
    runs-on: public-ubuntu-latest-16-cores
    needs: [clean-docs]
    if: github.event_name == 'pull_request' && always() && (needs.clean-docs.result == 'success' || needs.clean-docs.result == 'skipped')
    steps:
      - uses: ansys/actions/doc-deploy-pr@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          maximum-pr-doc-deployments: 5

      - name: "Install Git and clone project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Update gh-pages versions.json"
        uses: ./.github/workflows/update-gh-pages/
        with:
          bot-username: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  build-library:
    name: Build library
    runs-on: ubuntu-latest
    needs: [clean-docs]
    steps:
    - name: "Install Git and clone project"
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: "Set up Python"
      uses: ansys/actions/_setup-python@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
      with:
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        use-cache: false
        provision-uv: false
        prune-uv-cache: false

    - name: "Download stubs"
      uses: ./.github/workflows/setup-stubs/
      with:
        folder-pattern: "v[0-9][0-9][0-9]-${{ env.MAIN_PYTHON_VERSION }}"
        package-path: "${{ env.PACKAGE_PATH }}"
        python-version: ${{ env.MAIN_PYTHON_VERSION }}

    - name: Build library source and wheel artifacts
      uses: ansys/actions/build-library@a5b0351dc277d68c2dc1beca2d2674c7dfa4fc55 # v10.3.3
      with:
        library-name: ${{ env.PACKAGE_NAME }}
        python-version: ${{ env.MAIN_PYTHON_VERSION }}
        checkout: false

  release:
    runs-on: ubuntu-latest
    needs: [smoke-tests, build-library, update-changelog]
    environment: release
    permissions:
      id-token: write
      contents: write
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    steps:
      - name: "Download the library artifacts from build-library step"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      - name: "Upload artifacts to PyPI using trusted publisher"
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          print-hash: true
          packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
          skip-existing: false

      - name: "Release to GitHub"
        uses: ansys/actions/release-github@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}

  doc-deploy-dev:
    name: "Deploy development documentation"
    if: github.ref == 'refs/heads/main'
    runs-on: public-ubuntu-latest-16-cores
    needs: [clean-docs]
    steps:
      - name: "Deploy development documentation"
        uses: ansys/actions/doc-deploy-dev@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

      - name: "Install Git and clone project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Update gh-pages versions.json"
        uses: ./.github/workflows/update-gh-pages/
        with:
          bot-username: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}


  doc-deploy-stable:
    name: "Deploy stable documentation"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: public-ubuntu-latest-16-cores
    needs: release
    steps:
      - name: "Deploy stable documentation"
        uses: ansys/actions/doc-deploy-stable@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

      - name: "Install Git and clone project"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Update gh-pages versions.json"
        uses: ./.github/workflows/update-gh-pages/
        with:
          bot-username: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
