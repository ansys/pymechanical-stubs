name: Dependabot auto-merge
on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependabot-automerge:
    name: "Auto-merge Dependabot PRs"
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'dependabot/')
    permissions:
      pull-requests: write   # Required to approve and comment on Dependabot PRs
      contents: write        # Needed to merge pull requests into the default branch
    steps:

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@08eff52bf64351383d43138f652814d4ed4d8e29 # v2.3.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}

      - name: Enable auto-merge for Dependabot PRs (non-major)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
