name: >
  Update gh-pages versions.json

description: |
  Checks if the versions.json file in the doc folder differs from the one on
  the gh-pages branch. If it has changed (or does not yet exist on gh-pages),
  the file is committed and pushed to gh-pages.

inputs:

  bot-username:
    description: >
      Git username to use for the commit.
    required: true

  bot-email:
    description: >
      Git email to use for the commit.
    required: true

  deploy-target:
    description: >
      Documentation deployment target. Supported values are pr, dev, and stable.
    required: true

runs:
  using: "composite"
  steps:

    - name: "Check if versions.json has changed"
      id: check-versions
      shell: bash
      run: |
        git fetch origin gh-pages
        if git show origin/gh-pages:versions.json > /tmp/gh-pages-versions.json 2>/dev/null; then
          if diff -q doc/versions.json /tmp/gh-pages-versions.json > /dev/null 2>&1; then
            echo "versions_changed=false" >> $GITHUB_OUTPUT
            echo "versions.json is unchanged, skipping update."
          else
            echo "versions_changed=true" >> $GITHUB_OUTPUT
            echo "versions.json has changed, update required."
          fi
        else
          echo "versions_changed=true" >> $GITHUB_OUTPUT
          echo "versions.json not found on gh-pages, update required."
        fi

    - name: "Update versions.json file"
      if: steps.check-versions.outputs.versions_changed == 'true'
      shell: bash
      run: |
        cp doc/versions.json /tmp/versions.json
        git fetch origin gh-pages:gh-pages
        git checkout gh-pages
        cp /tmp/versions.json versions.json
        git config user.name "${{ inputs.bot-username }}"
        git config user.email "${{ inputs.bot-email }}"
        git add versions.json
        git commit -m "Update versions.json [skip ci]"
        git push origin gh-pages
        git checkout -

    - name: "Move content of stable folder to version folder"
      if: inputs.deploy-target == 'stable'
      shell: bash
      run: |
        git fetch origin gh-pages:gh-pages
        git checkout gh-pages
        if [ -d "version/stable" ]; then
          shopt -s nullglob dotglob
          changed=false
          for item in version/stable/*; do
            basename_item=$(basename "$item")
            [[ "$basename_item" == _* ]] && continue
            rm -rf "version/$basename_item"
            mv "$item" version/
            changed=true
          done
          shopt -u nullglob dotglob
          if [ "$changed" = true ]; then
            rm -rf version/stable/
            rm -f index.html
            ls -l version/
            git config user.name "${{ inputs.bot-username }}"
            git config user.email "${{ inputs.bot-email }}"
            git add -A version index.html
            git diff --cached --quiet || git commit -m "Reorganize version directory structure [skip ci]"
            git push origin gh-pages
          else
            echo "version/stable exists but contains no deployable content, skipping reorganization."
          fi
        else
          echo "version/stable not found, skipping reorganization."
        fi
        git checkout -

    - name: "Create root index.html redirect"
      if: inputs.deploy-target == 'stable'
      shell: bash
      run: |
        git fetch origin gh-pages:gh-pages
        git checkout gh-pages
        # Find the highest v### version folder that actually exists on gh-pages,
        # rather than trusting versions.json which may list versions not yet deployed.
        LATEST_VERSION=$(find version/api/ansys/mechanical/stubs -maxdepth 1 -type d -name "v[0-9][0-9][0-9]" 2>/dev/null | sort | tail -1 | xargs -r basename | sed 's/^v//')
        if [ -z "$LATEST_VERSION" ]; then
          echo "No deployed version folders found under version/api/ansys/mechanical/stubs, skipping index.html update."
          git checkout -
          exit 0
        fi
        echo "Latest deployed version: $LATEST_VERSION"
        REDIRECT_URL="version/api/ansys/mechanical/stubs/v${LATEST_VERSION}/index.html"
        cat > index.html <<EOF
        <!DOCTYPE html>
        <html>
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=${REDIRECT_URL}" />
            <title>PyMechanical Stubs</title>
            <script>window.location.replace("${REDIRECT_URL}");</script>
          </head>
          <body>
            <p>Redirecting to the latest API version. If not redirected, <a href="${REDIRECT_URL}">click here</a>.</p>
          </body>
        </html>
        EOF
        git config user.name "${{ inputs.bot-username }}"
        git config user.email "${{ inputs.bot-email }}"
        git add index.html
        git diff --cached --quiet || git commit -m "Update root index.html redirect to v${LATEST_VERSION} [skip ci]"
        git push origin gh-pages
        git checkout -